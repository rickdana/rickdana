<div class="modal">
  <ion-header-bar>
    <h1 class="title">Connexion</h1>
    <div class="buttons">
      <button class="button button-clear" ng-click="closeLogin()">Close</button>
    </div>
  </ion-header-bar>
  <ion-content>
    <form ng-submit="doLogin()">
      <div class="ban">
        <img src="img/logo_caem_200.jpg" alt="Logo Caem" class="img img-rounded img-responsive">
      </div>
      <div class="list">
        <label class="item item-input">
          <span class="input-label">Email* :</span>
          <input type="email" ng-model="loginData.email" placeholder="Email" required  overwrite-email />
        </label>
        <label class="item item-input">
          <span class="input-label">Mot de passe* :</span>
          <input type="password" ng-model="loginData.password" placeholder="Mot de passe" required>
        </label>
        <h6 class="clair">* Champ obligatoire</h6>
         <div class="loginButton">
            <p style="text-align: center;"><button class="button  button-positive" type="submit">  Se connecter  </button></p>
            <h5 style="text-align: right;" ng-click="logon()">Pas de compte ?<span class="logonText"> <a href="" title="">Créer un compte</a></span></h5>
         </div>

      </div>
    </form>
  </ion-content>
</div>
