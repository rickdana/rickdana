<ion-side-menus>
  <ion-pane ion-side-menu-content>
    <ion-nav-bar class="bar-assertive nav-title-slide-ios7 nav-buttons">
      <ion-nav-back-button class="button-clear"><i class="icon ion-ios7-arrow-back"></i>  Retour</ion-nav-back-button>
    </ion-nav-bar>
    <ion-nav-view name="menuContent" animation="slide-left-right"></ion-nav-view>
  </ion-pane>

  <ion-side-menu side="left">
    <header class="bar bar-header bar-assertive">
      <h1 class="title">menu</h1>
    </header>
    <ion-content class="has-header">
      <ion-list>
        <ion-item nav-clear menu-close  ng-show="auth">
          <div class="profil-centre">
                <img src="http://lorempicsum.com/futurama/80/80/6" alt="..." class="img-circle">
                <p style="margin-top:13px;"><strong>{{user.prenom}} {{user.nom}}</strong></p>
                <p><small>Connecté !</small></p>
                <button class="button button-outline button-assertive"ng-click="doLogout()">Se deconnecter</button>
          </div>
        </ion-item>
        <ion-item nav-clear menu-close ng-click="login()"  class="item-icon-left" ng-hide="auth">
          <i class="icon ion-ios7-person-outline"></i>
          <p ng-click="login()">Connectez-vous !</p>
        </ion-item>
        <ion-item nav-clear menu-close href="#/app/playlists" class="item-icon-left">
          <i class="icon ion-ios7-star"></i>
         Favoris
        </ion-item>
        <ion-item nav-clear menu-close href="#/app/browse" class="item-icon-left">
         <i class="icon ion-ios7-cart"></i>
         Mes commerçants
        </ion-item>
        <ion-item nav-clear menu-close  class="item-icon-left" ng-click="editProfil()">
         <i class="icon ion-ios7-person"></i>
         Profil
        </ion-item>
        <ion-item nav-clear menu-close href="#/app/browse" class="item-icon-left">
         <i class="icon ion-log-out"></i>
         Quitter
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-side-menu>
</ion-side-menus>
